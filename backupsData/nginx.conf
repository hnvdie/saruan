##############################################################
#  Nginx Config — UndanganKita (anti-leak, anti-Shodan)
#  Simpan di: /etc/nginx/sites-available/undangankita
#  Lalu: sudo ln -s /etc/nginx/sites-available/undangankita /etc/nginx/sites-enabled/
##############################################################

# ── Block akses langsung via IP (cegah Shodan/scanner nemu isinya) ──
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;   # drop koneksi tanpa response, bukan redirect
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;
    ssl_certificate     /etc/nginx/ssl/dummy.crt;   # self-signed dummy
    ssl_certificate_key /etc/nginx/ssl/dummy.key;
    return 444;
}

# ── Server utama ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name habarkita.com www.habarkita.com;

    # Redirect semua HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name habarkita.com www.habarkita.com;

    # ── SSL (pakai Certbot/Let's Encrypt) ──────────────────────────
    ssl_certificate     /etc/letsencrypt/live/habarkita.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/habarkita.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # ── Security Headers ───────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Sembunyikan versi Nginx dari header
    server_tokens off;

    # ── Block akses ke file sensitif ────────────────────────────────
    location ~ /\. {
        # Block semua dotfiles: .env, .git, .htaccess, dll
        deny all;
        return 404;
    }
    location ~ \.(env|db|sqlite|sqlite3|log|sh|py|cfg|ini|bak|sql)$ {
        deny all;
        return 404;
    }
    location ^~ /data/ {
        deny all;
        return 404;
    }
    location ^~ /.git/ {
        deny all;
        return 404;
    }

    # ── Rate limiting (definisikan di nginx.conf http block) ────────
    # Di /etc/nginx/nginx.conf tambahkan di dalam http {}:
    #   limit_req_zone $binary_remote_addr zone=rsvp:10m rate=5r/m;
    #   limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;

    location /rsvp/ {
        limit_req zone=rsvp burst=3 nodelay;
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/proxy_params;
    }

    # ── Proxy ke Flask ──────────────────────────────────────────────
    location / {
        limit_req zone=general burst=20 nodelay;
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
    }

    # ── Static files langsung dari Nginx (lebih cepat) ─────────────
    location /static/ {
        alias /path/to/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
