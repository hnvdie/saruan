<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin — UndanganKita</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'DM Sans',sans-serif;font-weight:300;
  background:#0a0a0a;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
body::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 50%,rgba(201,168,76,.06) 0%,transparent 60%),
             radial-gradient(ellipse at 70% 20%,rgba(201,168,76,.04) 0%,transparent 50%);
}
.login-box{
  position:relative;z-index:1;
  width:100%;max-width:380px;
  padding:2.5rem;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);
  border-radius:8px;
  backdrop-filter:blur(20px);
}
.logo{
  text-align:center;margin-bottom:2.5rem;
}
.logo-text{
  font-size:1.3rem;font-weight:400;color:#fff;letter-spacing:.05em;
}
.logo-text span{color:#c9a84c;}
.logo-sub{font-size:.68rem;letter-spacing:.25em;text-transform:uppercase;color:rgba(255,255,255,.25);margin-top:.3rem;}
.field{margin-bottom:1.2rem;}
.field label{
  display:block;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;
  color:rgba(255,255,255,.35);margin-bottom:.5rem;
}
.field input{
  width:100%;padding:.85rem 1rem;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  border-radius:4px;
  color:#fff;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:300;
  outline:none;transition:border .2s;
  -webkit-autofill:{background:transparent}
}
.field input:focus{border-color:rgba(201,168,76,.5);}
.field input::placeholder{color:rgba(255,255,255,.2);}
.error-msg{
  background:rgba(220,50,50,.1);border:1px solid rgba(220,50,50,.2);
  color:#ff8888;font-size:.78rem;padding:.75rem 1rem;border-radius:4px;
  margin-bottom:1.2rem;line-height:1.5;
}
.warning-msg{
  background:rgba(255,165,0,.08);border:1px solid rgba(255,165,0,.2);
  color:#ffa500;font-size:.78rem;padding:.75rem 1rem;border-radius:4px;
  margin-bottom:1.2rem;
}
.submit-btn{
  width:100%;padding:.9rem;
  background:linear-gradient(135deg,#c9a84c,#a8863c);
  border:none;border-radius:4px;
  color:#000;font-family:'DM Sans',sans-serif;font-weight:500;
  font-size:.82rem;letter-spacing:.15em;text-transform:uppercase;
  cursor:pointer;transition:opacity .2s;
  margin-top:.3rem;
}
.submit-btn:hover{opacity:.9;}
.security-note{
  text-align:center;margin-top:1.5rem;
  font-size:.65rem;color:rgba(255,255,255,.15);letter-spacing:.05em;
}
/* Flash messages */
{% with messages = get_flashed_messages(with_categories=true) %}
{% endwith %}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <div class="logo-text">Undangan<span>Kita</span></div>
    <div class="logo-sub">Admin Panel</div>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="{{ 'warning-msg' if cat == 'warning' else 'error-msg' }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="post" autocomplete="off">
    <div class="field">
      <label>Username</label>
      <input type="text" name="username" placeholder="Username admin" autocomplete="username" required>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="submit-btn">Masuk</button>
  </form>

  <div class="security-note">🔒 Sesi akan berakhir setelah 8 jam tidak aktif</div>
</div>
</body>
</html>
