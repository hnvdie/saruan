<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login — {{ site_name }}</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&family=Cormorant+Garamond:ital,wght@1,400&display=swap" rel="stylesheet">
{% if recaptcha_key %}<script src="https://www.google.com/recaptcha/api.js" async defer></script>{% endif %}
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#fafaf8;--white:#fff;--border:#e8e4dc;--ink:#1a1a1a;--muted:#888;--gold:#c9a84c;--red:#ef4444;--sans:'DM Sans',sans-serif;}
body{background:var(--bg);font-family:var(--sans);font-weight:300;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.card{width:100%;max-width:360px;background:var(--white);border:1px solid var(--border);border-radius:4px;padding:2.4rem;}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-style:italic;text-align:center;margin-bottom:.25rem;}
.logo span{color:var(--gold);}
.logo-sub{font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:1.9rem;}
.divider{height:1px;background:var(--border);margin-bottom:1.9rem;}
.form-group{margin-bottom:1.15rem;}
.form-label{display:block;font-size:.63rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;}
.form-input{width:100%;padding:.75rem .95rem;border:1.5px solid var(--border);border-radius:2px;font-family:var(--sans);font-size:.86rem;font-weight:300;color:var(--ink);outline:none;transition:border-color .15s;}
.form-input:focus{border-color:var(--gold);}
.error-box{padding:.7rem .95rem;background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.18);border-radius:2px;font-size:.76rem;color:var(--red);margin-bottom:1.1rem;}
.recaptcha-wrap{margin-bottom:1.1rem;display:flex;justify-content:center;}
.submit-btn{width:100%;padding:.86rem;background:var(--ink);color:#fff;border:none;border-radius:2px;font-family:var(--sans);font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;cursor:pointer;transition:background .15s;}
.submit-btn:hover{background:#333;}
.back-link{display:block;text-align:center;margin-top:1.25rem;font-size:.67rem;color:var(--muted);text-decoration:none;transition:color .15s;}
.back-link:hover{color:var(--ink);}
</style>
</head>
<body>
<div class="card">
  <div class="logo">{{ site_name.split(' ')[0] }}<span>{{ site_name.split(' ')[1] if ' ' in site_name else '' }}</span></div>
  <div class="logo-sub">Admin</div>
  <div class="divider"></div>

  {% if error %}
  <div class="error-box">⚠ {{ error }}</div>
  {% endif %}

  <form method="POST" action="/admin/login">
    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" type="text" name="username" autocomplete="username" autofocus required>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" name="password" autocomplete="current-password" required>
    </div>
    {% if recaptcha_key %}
    <div class="recaptcha-wrap">
      <div class="g-recaptcha" data-sitekey="{{ recaptcha_key }}"></div>
    </div>
    {% endif %}
    <button type="submit" class="submit-btn">Masuk</button>
  </form>
  <a href="/" class="back-link">← Kembali ke beranda</a>
</div>
</body>
</html>
